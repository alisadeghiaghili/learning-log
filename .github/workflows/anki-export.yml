name: Export flashcards to Anki txt

on:
  push:
    paths:
      - "deep-learning/flashcards.md"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-anki-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate Anki txt files with section tags
        run: |
          python3 << 'EOF'
          import re

          with open('deep-learning/flashcards.md', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          main_cards = []
          review_cards = []
          current_section = 'General'
          in_needs_review = False

          for line in lines:
              stripped = line.strip()
              # detect section headings (## ...)
              if stripped.startswith('## '):
                  heading = stripped[3:].strip()
                  if heading.lower().startswith('needs review'):
                      in_needs_review = True
                  else:
                      in_needs_review = False
                      # slugify: keep alphanumeric, replace spaces/special with -
                      current_section = re.sub(r'[^\w\u0600-\u06FF]+', '-', heading).strip('-')
                  continue
              # skip non-card lines
              if ';' not in stripped:
                  continue
              if stripped.startswith('#') or stripped.startswith('<!--') or stripped.startswith('---'):
                  continue
              card = f"[{current_section}] {stripped}"
              if in_needs_review:
                  review_cards.append(card)
              else:
                  main_cards.append(card)

          with open('deep-learning/flashcards_anki.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(main_cards) + '\n')

          with open('deep-learning/flashcards_needs_review_anki.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(review_cards) + '\n')

          print(f'Main cards: {len(main_cards)}')
          print(f'Review cards: {len(review_cards)}')
          EOF

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deep-learning/flashcards_anki.txt deep-learning/flashcards_needs_review_anki.txt
            git commit -m "Update Anki exports from flashcards.md"
            git pull --rebase origin main
            git push
          else
            echo "No changes in Anki export files"
          fi
