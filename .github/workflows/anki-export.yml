name: Export flashcards to Anki txt

on:
  push:
    paths:
      - "deep-learning/flashcards.md"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-anki-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate main Anki txt (non-review cards)
        run: |
          awk '
            BEGIN { in_needs_review = 0 }
            /^## Needs Review/ { in_needs_review = 1 }
            /;/ && !in_needs_review && $0 !~ /^#/ && $0 !~ /^<!--/ && $0 !~ /^---/ {
              print $0
            }
          ' deep-learning/flashcards.md > deep-learning/flashcards_anki.txt

      - name: Generate Needs Review Anki txt
        run: |
          awk '
            BEGIN { in_needs_review = 0 }
            /^## Needs Review/ { in_needs_review = 1; next }
            /;/ && in_needs_review && $0 !~ /^#/ && $0 !~ /^<!--/ && $0 !~ /^---/ {
              print $0
            }
          ' deep-learning/flashcards.md > deep-learning/flashcards_needs_review_anki.txt

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deep-learning/flashcards_anki.txt deep-learning/flashcards_needs_review_anki.txt
            git commit -m "Update Anki exports from flashcards.md"
            git pull --rebase origin main
            git push
          else
            echo "No changes in Anki export files"
          fi
