name: Export flashcards to Anki txt

on:
  push:
    paths:
      - "deep-learning/flashcards.md"
      - "deep-learning/progress.md"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-anki-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate Anki txt files with RTL HTML support
        run: |
          python3 << 'EOF'
          import re

          SEP = '\t'  # Tab separator — never appears in HTML attributes or card text

          def wrap_rtl(text):
              text = text.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')
              return f'<div dir="rtl" style="text-align:right;font-family:Tahoma,Arial,sans-serif">{text}</div>'

          # ─── Read metadata from progress.md ───────────────────────────────────
          domain_tag = 'deep_learning'
          course_tag = 'unknown_course'
          raw_course = 'Course'

          try:
              with open('deep-learning/progress.md', 'r', encoding='utf-8') as pf:
                  for line in pf:
                      m = re.match(r'\*{0,2}Course:\*{0,2}\s*(.+)', line.strip())
                      if m:
                          raw_course = m.group(1).strip().rstrip('*').strip()
                          course_tag = re.sub(r'[^\w\u0600-\u06FF]+', '_', raw_course).strip('_').lower()
                          break
          except FileNotFoundError:
              pass

          # ─── Read flashcards.md ────────────────────────────────────────────────
          with open('deep-learning/flashcards.md', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          main_cards = []
          review_cards = []
          current_section_tag = 'general'
          in_needs_review = False

          for line in lines:
              stripped = line.strip()

              if stripped.startswith('## '):
                  heading = stripped[3:].strip()
                  if heading.lower().startswith('needs review'):
                      in_needs_review = True
                  else:
                      in_needs_review = False
                      current_section_tag = re.sub(r'[^\w\u0600-\u06FF]+', '_', heading).strip('_').lower()
                  continue

              if ';' not in stripped:
                  continue
              if stripped.startswith('#') or stripped.startswith('<!--') or stripped.startswith('---'):
                  continue

              parts = stripped.split(';', 1)
              if len(parts) != 2:
                  continue

              front = wrap_rtl(parts[0].strip())
              back  = wrap_rtl(parts[1].strip())
              tags  = f"domain::{domain_tag} course::{course_tag} section::{current_section_tag}"
              row   = SEP.join([front, back, tags])

              if in_needs_review:
                  review_cards.append(row)
              else:
                  main_cards.append(row)

          # ─── Anki import headers (Tab-separated) ──────────────────────────────
          anki_header = (
              "#separator:tab\n"
              "#html:true\n"
              "#notetype:Basic\n"
              f"#deck:Deep Learning::{raw_course}\n"
              "#tags column:3\n"
              "#columns:Front\tBack\tTags\n"
          )

          with open('deep-learning/flashcards_anki.txt', 'w', encoding='utf-8') as f:
              f.write(anki_header)
              f.write('\n'.join(main_cards) + '\n')

          with open('deep-learning/flashcards_needs_review_anki.txt', 'w', encoding='utf-8') as f:
              f.write(anki_header)
              f.write('\n'.join(review_cards) + '\n')

          print(f'Course tag  : {course_tag}')
          print(f'Main cards  : {len(main_cards)}')
          print(f'Review cards: {len(review_cards)}')
          EOF

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deep-learning/flashcards_anki.txt deep-learning/flashcards_needs_review_anki.txt
            git commit -m "Update Anki exports from flashcards.md"
            git pull --rebase origin main
            git push
          else
            echo "No changes in Anki export files"
          fi
