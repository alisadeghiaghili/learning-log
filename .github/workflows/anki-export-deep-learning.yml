name: Export Deep Learning flashcards to Anki txt

on:
  push:
    paths:
      - "deep-learning/flashcards.md"
      - "deep-learning/flashcards-fa.md"
      - "deep-learning/progress.md"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-anki-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate Anki txt files (EN + FA)
        run: |
          python3 << 'EOF'
          import re

          SEP = '\t'

          def wrap_ltr(text):
              text = text.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')
              return f'<div dir="ltr" style="text-align:left;font-family:monospace,Consolas,sans-serif">{text}</div>'

          def wrap_rtl(text):
              text = text.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')
              return f'<div dir="rtl" style="text-align:right;font-family:Tahoma,Arial,sans-serif">{text}</div>'

          # ─── Read metadata from progress.md ───────────────────────────────────
          domain_tag = 'deep_learning'
          course_tag = 'unknown_course'
          raw_course = 'Course'

          try:
              with open('deep-learning/progress.md', 'r', encoding='utf-8') as pf:
                  for line in pf:
                      m = re.match(r'\*{0,2}Course:\*{0,2}\s*(.+)', line.strip())
                      if m:
                          raw_course = m.group(1).strip().rstrip('*').strip()
                          course_tag = re.sub(r'[^\w\u0600-\u06FF]+', '_', raw_course).strip('_').lower()
                          break
          except FileNotFoundError:
              pass

          def parse_flashcards(filepath, wrap_fn):
              main_cards = []
              review_cards = []
              current_section_tag = 'general'
              in_needs_review = False
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      lines = f.readlines()
              except FileNotFoundError:
                  return main_cards, review_cards

              for line in lines:
                  stripped = line.strip()
                  if stripped.startswith('## '):
                      heading = stripped[3:].strip()
                      if heading.lower().startswith('needs review'):
                          in_needs_review = True
                      else:
                          in_needs_review = False
                          current_section_tag = re.sub(r'[^\w\u0600-\u06FF]+', '_', heading).strip('_').lower()
                      continue
                  if ';' not in stripped:
                      continue
                  if stripped.startswith('#') or stripped.startswith('<!--') or stripped.startswith('---'):
                      continue
                  # Strip bracket metadata like [Deep Learning][...][...]
                  clean = re.sub(r'\[[^\]]*\]', '', stripped).strip()
                  parts = clean.split(';', 1)
                  if len(parts) != 2:
                      continue
                  front = wrap_fn(parts[0].strip())
                  back  = wrap_fn(parts[1].strip())
                  tags  = f"domain::{domain_tag} course::{course_tag} section::{current_section_tag}"
                  row   = SEP.join([front, back, tags])
                  if in_needs_review:
                      review_cards.append(row)
                  else:
                      main_cards.append(row)
              return main_cards, review_cards

          # ─── Anki import header ────────────────────────────────────────────────
          def anki_header(deck_name):
              return (
                  "#separator:tab\n"
                  "#html:true\n"
                  "#notetype:Basic\n"
                  f"#deck:{deck_name}\n"
                  "#tags column:3\n"
                  "#columns:Front\tBack\tTags\n"
              )

          # ─── English deck ──────────────────────────────────────────────────────
          en_main, en_review = parse_flashcards('deep-learning/flashcards.md', wrap_ltr)
          en_deck = f"Deep Learning::{raw_course}"

          with open('deep-learning/flashcards_anki.txt', 'w', encoding='utf-8') as f:
              f.write(anki_header(en_deck))
              f.write('\n'.join(en_main) + '\n')

          with open('deep-learning/flashcards_needs_review_anki.txt', 'w', encoding='utf-8') as f:
              f.write(anki_header(en_deck))
              f.write('\n'.join(en_review) + '\n')

          # ─── Persian deck ──────────────────────────────────────────────────────
          fa_main, fa_review = parse_flashcards('deep-learning/flashcards-fa.md', wrap_rtl)
          fa_deck = f"Deep Learning FA::{raw_course}"

          with open('deep-learning/flashcards-fa_anki.txt', 'w', encoding='utf-8') as f:
              f.write(anki_header(fa_deck))
              f.write('\n'.join(fa_main) + '\n')

          with open('deep-learning/flashcards-fa_needs_review_anki.txt', 'w', encoding='utf-8') as f:
              f.write(anki_header(fa_deck))
              f.write('\n'.join(fa_review) + '\n')

          print(f'Course        : {raw_course}')
          print(f'EN main       : {len(en_main)}')
          print(f'EN review     : {len(en_review)}')
          print(f'FA main       : {len(fa_main)}')
          print(f'FA review     : {len(fa_review)}')
          EOF

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deep-learning/flashcards_anki.txt \
                    deep-learning/flashcards_needs_review_anki.txt \
                    deep-learning/flashcards-fa_anki.txt \
                    deep-learning/flashcards-fa_needs_review_anki.txt
            git commit -m "Update Deep Learning Anki exports (EN + FA)"
            git pull --rebase origin main
            git push
          else
            echo "No changes in Anki export files"
          fi
